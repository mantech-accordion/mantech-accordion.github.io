apiVersion: ui.accordions.co.kr/v1beta1
kind: ClusterDashboard
metadata:
  annotations:
    ui.accordions.co.kr/display-name: 샘플 AI 클러스터 대시보드
  name: sample-ai-cluster-dashbaord
spec:
  apis: []
  globalValues:
    end: now
    refreshTime: "off"
    start: 5m
    step: 90
  tabs: []
  widgets:
  - metadata:
      name: header
    spec:
      config:
        h: 4
        w: 12
        xaxis: 0
        yaxis: 0
      valueSchema:
        properties:
          header:
            properties:
              badgeText:
                type: string
              text:
                type: string
            x-ui-format: badge
          redirectButton:
            properties:
              href:
                type: string
              text:
                type: string
            type: object
            x-ui-format: redirect-button
          refreshButton:
            properties:
              refreshTime:
                type: string
              showButtonSchema:
                default: true
                type: boolean
            type: object
            x-ui-format: refresh-button
          timePicker:
            properties:
              end:
                type: string
              start:
                type: string
            type: object
            x-ui-format: time-picker
        type: object
        x-ui-delete:
          x-ui-delete-api-path: /apis/k8s/ui.accordions.co.kr/v1beta1/clusterdashboards/sample-ai-cluster-dashbaord
          x-ui-delete-redirect-url: monitorings/monitoring-dashboard
        x-ui-displayName: 샘플 AI 클러스터 대시보드
        x-ui-format: header
      values:
        header:
          badgeText: Dashboard
          text: 샘플 AI 클러스터 대시보드
        refreshButton:
          refreshTime:
            value: :refreshTime
            x-ui-type: globalValues
          showButtonSchema: true
        timePicker:
          end:
            value: :end
            x-ui-type: globalValues
          start:
            value: :start
            x-ui-type: globalValues
  - metadata:
      name: top-chart-1780029289696
    spec:
      apis:
      - method: get
        name: topk-query
        path: /apis/acc/thanos/v1/query
        searchParams:
          query: topk%285%2C%28sum%28rate%28node_cpu_seconds_total%7Bmode%21%3D%22idle%22%7D%5B5m%5D%29%29+by+%28instance%29+%2F+count%28node_cpu_seconds_total%7Bmode%3D%22idle%22%7D%29+by+%28instance%29+%2A+100%29%29
          time:
            type: duration-ms
            value: :end
      config:
        autoH: true
        h: 35
        w: 4
        xaxis: 0
        yaxis: 0
      previewValues:
        progressItem:
        - name: node1
          value: 70
        - name: node2
          value: 50
        subTitle: '단위: %'
        suffix: '%'
        title: CPU 사용량 Top 7
        unit: '%'
      uiTemplate:
        metadata: {}
        spec:
          template: |-
            {{- $v := . | default dict -}}
            spec:
              apis:
                - method: get
                  name: topk-query
                  path: {{ if eq $v.strategy "custom" }}{{ ($v.externalServer | trimSuffix "/") }}/api/v1/query{{ else }}/apis/acc/thanos/v1/query{{ end }}
                  searchParams:
                    {{- if $v.queries.query.query }}
                    query: |-
                      {{ with $v.queries.options }}
                        {{- if eq .order "desc" }}
                          {{- printf "topk(%s,(%s))" (.num) ($v.queries.query.query) | urlquery -}}
                        {{ else }}
                          {{- printf "bottomk(%s,(%s))" (.num) ($v.queries.query.query) | urlquery -}}
                        {{- end }}
                      {{- end }}
                    {{- else }}
                    query: ""
                    {{- end }}
                    time:
                      type: duration-ms
                      value: :end
              values:
                title: {{ $v.chartTitle | default "" | quote }}
                subTitle: {{ $v.subTitle | default "" | quote }}
                progressItem:
                  x-ui-api-base: |-
                    ."topk-query".data.result | map({
                      "name": (.metric."{{ $v.queries.metricLabel }}"? // "unknown"),
                      "value": (.value[1] | tonumber)
                    })
                  x-ui-apis:
                    - name: topk-query
                  x-ui-type: apis
                {{- if eq $v.unit "cpu" }}
                unit: cpu
                suffix: {{ $v.cpuSuffix }}
                {{- else if eq $v.unit "memory" }}
                unit: memory
                suffix: {{ $v.memSuffix }}
                {{- else }}
                suffix: {{ $v.suffix | default "" | quote }}
                {{- end}}
          valueSchema: |-
            type: object
            properties:
              chartTitle:
                type: string
                default: 차트
                x-ui-displayName: 차트명
              subTitle:
                type: string
                x-ui-displayName: 차트 설명
              strategy:
                type: string
                x-ui-format: radio
                default: thanos
                enum:
                  - thanos
                  - custom
                x-ui-enum-displayName:
                  - 내부 모니터링 서버 (Thanos)
                  - 외부 서버 지정
                x-ui-displayName: 모니터링 서버
              externalServer:
                type: string
                x-ui-displayName: 외부 모니터링 서버 주소
                x-ui-placeholder: https://thanos.svc.cluster.local
                x-ui-field-dependencies:
                  strategy: custom
              queries:
                type: object
                x-ui-displayName: 쿼리
                x-ui-boundary: true
                default:
                  query:
                    thanosBaseUrl: apis/acc/thanos/v1
                    query: ""
                  metricLabel: ""
                  options: {}
                properties:
                  query:
                    type: object
                    x-ui-format: promql-query
                    x-ui-width: 8
                    x-ui-displayName: PromQL
                    default:
                      thanosBaseUrl: apis/acc/thanos/v1
                      query: ""
                    properties:
                      thanosBaseUrl:
                        type: string
                        x-ui-displayName: Thanos Base URL
                        x-ui-placeholder: "http://thanos.svc.cluster.local"
                      query:
                        type: string
                        x-ui-displayName: PromQL
                  metricLabel:
                    type: string
                    x-ui-displayName: 메트릭 라벨
                    x-ui-width: 4
                    x-ui-placeholder: "name"
                  options:
                    type: object
                    x-ui-collapsable: true
                    x-ui-displayName: 옵션
                    properties:
                      num:
                        type: number
                        x-ui-displayName: 개수(N)
                        default: 5
                      order:
                        type: string
                        x-ui-displayName: 순서
                        x-ui-enum-displayName:
                        - 내림차순 (Top N)
                        - 오름차순 (Bottom N)
                        default: desc
                        enum:
                        - desc
                        - asc
              unit:
                type: string
                enum:
                  - cpu
                  - memory
                  - etc
                description: |-
                  단위 분류를 선택합니다. "기타" 선택 시 단위 값이 단순하게 데이터 뒤에 붙어 표현됩니다.
                x-ui-enum-displayName:
                  - CPU
                  - 메모리
                  - 기타
                x-ui-displayName: 단위 분류
                x-ui-width: 4
              cpuSuffix:
                type: string
                default: Core
                enum:
                  - n
                  - u
                  - m
                  - Core
                  - k
                  - M
                  - G
                x-ui-enum-displayName:
                  - 나노 코어(n)
                  - 마이크로 코어(u)
                  - 밀리 코어(m)
                  - 코어(Core)
                  - 킬로 코어(k)
                  - 메가 코어(M)
                  - 기가 코어(G)
                x-ui-displayName: 단위
                x-ui-width: 8
                x-ui-field-dependencies:
                  unit: cpu
              memSuffix:
                type: string
                default: Bytes
                enum:
                  - Bytes
                  - Ki
                  - Mi
                  - Gi
                  - Ti
                  - Pi
                x-ui-enum-displayName:
                  - 바이트(Bytes)
                  - 키비바이트(Ki)
                  - 메비바이트(Mi)
                  - 기비바이트(Gi)
                  - 테비바이트(Ti)
                  - 페비바이트(Pi)
                x-ui-displayName: 단위
                x-ui-width: 8
                x-ui-field-dependencies:
                  unit: memory
              suffix:
                type: string
                x-ui-displayName: 단위
                x-ui-width: 8
                x-ui-field-dependencies:
                  unit: etc
          values:
            chartTitle: 노드별 CPU 사용률 (TOP 5)
            queries:
              metricLabel: instance
              options:
                num: 5
                order: desc
              query:
                query: sum(rate(node_cpu_seconds_total{mode!="idle"}[5m])) by (instance)
                  / count(node_cpu_seconds_total{mode="idle"}) by (instance) * 100
                thanosBaseUrl: apis/acc/thanos/v1
            strategy: thanos
            subTitle: ""
            suffix: '%'
            unit: etc
      valueSchema:
        properties:
          progressItem:
            type: array
          subTitle:
            type: string
          suffix:
            description: |-
              unit === c  pu 인 경우, 'n' | 'u' | 'm' | 'Core' | 'k' | 'M' | 'G'
              unit === memory 인 경우, 'Bytes' | 'Ki' | 'Mi' | 'Gi' | 'Ti' | 'Pi'
            type: string
          title:
            type: string
          unit:
            enum:
            - cpu
            - memory
            type: string
        type: object
        x-ui-displayName: Top 차트
        x-ui-format: top-chart
      values:
        progressItem:
          x-ui-api-base: |-
            ."topk-query".data.result | map({
              "name": (.metric."instance"? // "unknown"),
              "value": (.value[1] | tonumber)
            })
          x-ui-apis:
          - name: topk-query
          x-ui-type: apis
        subTitle: ""
        suffix: '%'
        title: 노드별 CPU 사용률 (TOP 5)
